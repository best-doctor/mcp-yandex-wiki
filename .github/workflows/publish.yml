name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          from yandex_wiki_mcp.__about__ import __version__ as package_version

          tag = os.environ['GITHUB_REF_NAME']
          expected = tag[1:] if tag.startswith('v') else tag

          if package_version != expected:
              raise SystemExit(
                  f"Version mismatch: __about__.py has {package_version}, but tag is {tag}. "
                  f"Set version to {expected} before creating tag."
              )
          print(f"Version matched: {package_version}")
          PY

      - name: Syntax check
        run: uv run python -m compileall -q yandex_wiki_mcp

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

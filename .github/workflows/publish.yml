name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    needs: []
    environment:
      name: pypi
      url: https://pypi.org/p/yandex-wiki-mcp
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

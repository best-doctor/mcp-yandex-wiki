name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Проверки и сборка
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Syntax check
        run: uv run python -m compileall -q yandex_wiki_mcp

      - name: Build package
        run: uv build
